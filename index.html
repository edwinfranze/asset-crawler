<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Image Crawler</title>
<style>
:root{--bg:#0d1117;--sur:#161b22;--bdr:#30363d;--acc:#58a6ff;--adim:#1f3556;--txt:#e6edf3;--mut:#8b949e;--ok:#3fb950;--okbg:#1a3a2a;--err:#f85149;--errbg:#3a1a1a;--warn:#d29922;--r:10px;--f:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--f);font-size:15px;min-height:100vh;padding:20px 16px 40px}
h1{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:4px}
.sub{font-size:13px;color:var(--mut);line-height:1.5;margin-bottom:20px}
input[type=url]{width:100%;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);color:var(--txt);font-family:var(--f);font-size:15px;padding:12px 14px;outline:none;-webkit-appearance:none;margin-bottom:10px}
input:focus{border-color:var(--acc)}
input::placeholder{color:var(--mut)}
.opts{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.olbl{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--mut);cursor:pointer}
.olbl input[type=checkbox]{accent-color:var(--acc);width:16px;height:16px}
select{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-family:var(--f);font-size:13px;padding:6px 10px;outline:none;-webkit-appearance:none;cursor:pointer}
.btnrow{display:flex;gap:10px;margin-bottom:6px}
#goBtn{flex:1;background:var(--acc);border:none;border-radius:var(--r);color:#0d1117;font-family:var(--f);font-size:16px;font-weight:700;padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
#goBtn:disabled{opacity:.4;cursor:not-allowed}
#wpBtn{flex:1;background:var(--sur);border:1px solid var(--acc);border-radius:var(--r);color:var(--acc);font-family:var(--f);font-size:15px;font-weight:700;padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
#wpBtn:disabled{opacity:.4;cursor:not-allowed}
.note{font-size:11px;color:var(--mut);line-height:1.5}
#status{margin-top:12px;font-size:13px;color:var(--mut);min-height:18px;word-break:break-all}
.pbw{background:var(--sur);border-radius:4px;height:4px;margin-top:8px;overflow:hidden;display:none}
.pb{background:var(--acc);height:100%;width:0%;transition:width .2s}
.stats{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.chip{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--mut);display:flex;flex-direction:column;gap:2px}
.chip b{font-size:18px;font-weight:700;color:var(--txt)}
.chip.fail b{color:var(--err)}
#results{margin-top:16px}
.sech{font-size:12px;font-weight:600;color:var(--mut);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bdr)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;position:relative}
.thumb{width:100%;aspect-ratio:16/10;overflow:hidden;background:#0d1117;display:flex;align-items:center;justify-content:center}
.thumb img{width:100%;height:100%;object-fit:cover}
.ameta{padding:8px 10px 10px}
.afn{font-size:11px;color:var(--txt);word-break:break-all;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.apg{font-size:10px;color:var(--mut);margin-top:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.badge{position:absolute;top:6px;right:6px;border-radius:6px;font-size:10px;font-weight:700;padding:2px 6px;text-transform:uppercase}
.bok{background:var(--okbg);color:var(--ok)}
.berr{background:var(--errbg);color:var(--err)}
.bwp{background:#1a2a3a;color:#58a6ff}
.empty{text-align:center;padding:40px 20px;color:var(--mut);font-size:14px;line-height:1.7}
.logrow{display:flex;align-items:center;gap:8px;margin-top:8px}
.logbtn{font-size:12px;color:var(--mut);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:var(--f)}
.copybtn{font-size:11px;color:var(--acc);background:var(--adim);border:1px solid var(--acc);border-radius:6px;padding:3px 10px;cursor:pointer;font-family:var(--f);display:none}
.logbox{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);font-size:11px;color:var(--mut);padding:10px 12px;margin-top:6px;max-height:220px;overflow-y:auto;font-family:monospace;line-height:1.7;display:none}
.logbox.on{display:block}
.lerr{color:var(--err)}.lok{color:var(--ok)}.lwarn{color:var(--warn)}
</style>
</head>
<body>
<h1>Image Crawler</h1>
<p class="sub">Crawls a website and shows all publicly visible images.</p>

<input type="url" id="urlInput" value="https://paulus.unicoz.nl/" placeholder="https://example.com" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">

<div class="opts">
  <label class="olbl"><input type="checkbox" id="doSub" checked> Subpages</label>
  <label class="olbl">Depth: <select id="maxD"><option>1</option><option selected>2</option><option>3</option></select></label>
  <label class="olbl">Max pages: <select id="maxP"><option>10</option><option selected>20</option><option>50</option><option>100</option></select></label>
  <label class="olbl">Parallel: <select id="concur"><option>3</option><option>5</option><option selected>8</option><option>10</option><option>15</option></select></label>
</div>

<div class="btnrow">
  <button id="goBtn" onclick="runCrawl()">Crawl pages</button>
  <button id="wpBtn" onclick="runWP()">WP Media API</button>
</div>
<p class="note">WP Media API finds ALL uploaded images, including unused ones.</p>

<div id="status"></div>
<div class="pbw" id="pbw"><div class="pb" id="pb"></div></div>

<div class="logrow">
  <button class="logbtn" id="logbtn" onclick="toggleLog()" style="display:none">Show log</button>
  <button class="copybtn" id="copybtn" onclick="copyLog()">Copy log</button>
</div>
<div class="logbox" id="logbox"></div>

<div class="stats" id="statsRow" style="display:none">
  <div class="chip"><b id="sPages">0</b>Pages</div>
  <div class="chip"><b id="sImgs">0</b>Images</div>
  <div class="chip fail" id="sFailChip" style="display:none"><b id="sFails">0</b>Failed</div>
</div>

<div id="results"></div>

<script>
var images={},going=false,logs=[],visited={},queue=[],activeCount=0,pages=0,fails=0,maxPages=20,concur=8,doSub=true,maxD=2;

function isImage(u){return/\.(jpe?g|png|gif|webp|svg|ico|avif|bmp|tiff?)(\?|$)/i.test(u.split('#')[0]);}
function gname(u){try{var p=new URL(u).pathname;return decodeURIComponent(p.split('/').pop()||p||u);}catch(e){return u;}}
function directUrl(u){return u.split('?')[0].replace(/-\d+x\d+(\.(?:jpe?g|png|gif|webp|svg|avif))$/i,'$1');}
function abs(base,h){if(!h||/^(data:|blob:|javascript:)/.test(h))return null;try{return new URL(h,base).href;}catch(e){return null;}}
function same(base,u){try{return new URL(u).hostname===new URL(base).hostname;}catch(e){return false;}}
function eh(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function L(m,c){c=c||'';var t=new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});var line='['+t+'] '+m;logs.push({line:line,c:c});var b=document.getElementById('logbox');b.innerHTML=logs.map(function(l){return'<span class="l'+l.c+'">'+eh(l.line)+'</span>';}).join('<br>');b.scrollTop=b.scrollHeight;}
function st(m){document.getElementById('status').textContent=m;}
function pr(v){document.getElementById('pbw').style.display='block';document.getElementById('pb').style.width=Math.min(100,v)+'%';}
function toggleLog(){var b=document.getElementById('logbox');b.classList.toggle('on');document.getElementById('logbtn').textContent=b.classList.contains('on')?'Hide log':'Show log';}
function copyLog(){var text=logs.map(function(l){return l.line;}).join('\n');if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){var btn=document.getElementById('copybtn');btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy log';},2000);});}else{var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);var btn=document.getElementById('copybtn');btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy log';},2000);}}

var PROXIES=[
  function(u){return'https://api.allorigins.win/raw?url='+encodeURIComponent(u);},
  function(u){return'https://api.allorigins.win/get?url='+encodeURIComponent(u);},
  function(u){return'https://corsproxy.io/?url='+encodeURIComponent(u);}
];

async function fetchUrl(targetUrl){
  var lastErr='';
  for(var i=0;i<PROXIES.length;i++){
    try{
      var resp=await fetch(PROXIES[i](targetUrl),{headers:{'Accept':'*/*'}});
      if(!resp.ok){lastErr='HTTP '+resp.status;continue;}
      var text=await resp.text();
      if(text.trim().startsWith('{')){try{var j=JSON.parse(text);if(j.contents)text=j.contents;}catch(e){}}
      if(text.length<50){lastErr='Empty';continue;}
      return text;
    }catch(e){lastErr=e.message;}
  }
  throw new Error(lastErr||'All proxies failed');
}

function initUI(){
  images={};logs=[];visited={};queue=[];activeCount=0;pages=0;fails=0;
  document.getElementById('goBtn').disabled=true;
  document.getElementById('wpBtn').disabled=true;
  document.getElementById('statsRow').style.display='none';
  document.getElementById('sFailChip').style.display='none';
  document.getElementById('results').innerHTML='<div class="sech" id="imgHeader">IMAGES</div><div class="grid" id="grid"></div>';
  document.getElementById('pbw').style.display='none';
  document.getElementById('logbox').innerHTML='';
  document.getElementById('logbox').classList.remove('on');
  document.getElementById('logbtn').style.display='inline';
  document.getElementById('copybtn').style.display='inline';
  document.getElementById('logbtn').textContent='Show log';
}

function addImage(url, sourceLabel, badge){
  badge=badge||'bok';
  var clean=directUrl(url);
  if(images[clean])return;
  images[clean]={source:sourceLabel};
  var fn=eh(gname(clean));
  var sl=eh(sourceLabel);
  var su=clean.replace(/"/g,'%22');
  var card=document.createElement('div');
  card.className='card';
  card.innerHTML='<a href="'+su+'" target="_blank" rel="noopener" style="display:block;text-decoration:none"><div class="thumb"><img src="'+su+'" loading="lazy" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\';this.closest(\'.card\').querySelector(\'.badge\').className=\'badge berr\';this.closest(\'.card\').querySelector(\'.badge\').textContent=\'BLOCKED\'"><div style="display:none;width:100%;height:100%;align-items:center;justify-content:center;font-size:28px">🚫</div></div></a><div class="ameta"><div class="afn">'+fn+'</div><div class="apg">'+sl+'</div></div><span class="badge '+badge+'">VISIBLE</span>';
  document.getElementById('grid').appendChild(card);
  document.getElementById('sImgs').textContent=Object.keys(images).length;
}

function updateStats(){
  document.getElementById('sPages').textContent=pages;
  document.getElementById('sImgs').textContent=Object.keys(images).length;
  if(fails>0){document.getElementById('sFails').textContent=fails;document.getElementById('sFailChip').style.display='flex';}
  document.getElementById('statsRow').style.display='flex';
}

// === WP REST API MODE ===
async function runWP(){
  if(going)return;
  var raw=document.getElementById('urlInput').value.trim();
  if(!raw){st('Enter a URL first.');return;}
  var base;try{base=new URL(raw).origin;}catch(e){st('Invalid URL.');return;}
  going=true;
  initUI();
  st('Fetching WordPress media library...');
  pr(10);
  document.getElementById('logbtn').style.display='inline';

  var page=1,total=0,found=0;
  try{
    while(true){
      var apiUrl=base+'/wp-json/wp/v2/media?per_page=100&page='+page+'&media_type=image';
      L('Fetching WP API page '+page+': '+apiUrl);
      var text=await fetchUrl(apiUrl);
      var items;
      try{items=JSON.parse(text);}catch(e){throw new Error('JSON parse failed');}
      if(!Array.isArray(items)||items.length===0){L('No more items on page '+page);break;}
      L('Got '+items.length+' items on page '+page,'ok');
      for(var i=0;i<items.length;i++){
        var item=items[i];
        var src=item.source_url||'';
        if(src){addImage(src,'WP Media Library','bwp');found++;}
        // Also grab all sizes
        var sizes=item.media_details&&item.media_details.sizes?item.media_details.sizes:{};
        for(var sz in sizes){
          if(sizes[sz]&&sizes[sz].source_url){
            var su=sizes[sz].source_url;
            var clean=directUrl(su);
            if(!images[clean]){addImage(su,'WP Media ('+sz+')','bwp');}
          }
        }
      }
      total+=items.length;
      pr(Math.min(90,10+(page*10)));
      page++;
      if(items.length<100)break;
      await new Promise(function(r){setTimeout(r,200);});
    }
    pr(100);
    st('Done. Found '+Object.keys(images).length+' images in WP Media Library ('+total+' media items).');
    L('Complete. '+Object.keys(images).length+' unique images','ok');
  }catch(e){
    L('Error: '+e.message,'err');
    st('Error: '+e.message);
  }
  updateStats();
  document.getElementById('goBtn').disabled=false;
  document.getElementById('wpBtn').disabled=false;
  going=false;
}

// === PAGE CRAWLER MODE ===
function extractFromHtml(html,pageUrl){
  var imgs=new Set(),links=new Set();
  var doc;try{doc=new DOMParser().parseFromString(html,'text/html');}catch(e){return{imgs:[],links:[]};}
  var bel=doc.querySelector('base[href]');
  var base=bel?(abs(pageUrl,bel.getAttribute('href'))||pageUrl):pageUrl;
  function addImg(h){if(!h)return;if(h.startsWith('data:'))return;var x=abs(base,h);if(!x||x.startsWith('data:')||x.includes('base64'))return;var fn=x.split('?')[0].split('/').pop().toLowerCase();if(fn.length<3)return;imgs.add(x);}
  function addSS(v){if(!v)return;v.split(',').forEach(function(s){var p=s.trim().split(/\s+/)[0];if(p)addImg(p);});}
  doc.querySelectorAll('img').forEach(function(el){['src','data-src','data-lazy-src','data-original','data-img','data-image','data-bg','data-lazy','data-delayed-src','data-echo'].forEach(function(a){addImg(el.getAttribute(a));});['srcset','data-srcset','data-lazy-srcset'].forEach(function(a){addSS(el.getAttribute(a));});});
  doc.querySelectorAll('picture source').forEach(function(el){addSS(el.getAttribute('srcset'));addImg(el.getAttribute('src'));});
  doc.querySelectorAll('[style]').forEach(function(el){var m,re=/url\(\s*['"]?([^'")\s]+)['"]?\s*\)/gi,s=el.getAttribute('style')||'';while((m=re.exec(s))!==null){if(isImage(m[1]))addImg(m[1]);}});
  doc.querySelectorAll('style').forEach(function(el){var m,re=/url\(\s*['"]?([^'")\s]+)['"]?\s*\)/gi,css=el.textContent||'';while((m=re.exec(css))!==null){if(!m[1].startsWith('data:')&&isImage(m[1]))addImg(m[1]);}});
  doc.querySelectorAll('meta[property="og:image"],meta[name="twitter:image"],meta[property="og:image:url"]').forEach(function(el){addImg(el.getAttribute('content'));});
  doc.querySelectorAll('link[rel~="icon"][href],link[rel~="apple-touch-icon"][href]').forEach(function(el){addImg(el.getAttribute('href'));});
  doc.querySelectorAll('[data-background],[data-bg-src],[data-background-image]').forEach(function(el){['data-background','data-bg-src','data-background-image'].forEach(function(a){var v=el.getAttribute(a);if(v&&!v.startsWith('{'))addImg(v);});});
  doc.querySelectorAll('video[poster]').forEach(function(el){addImg(el.getAttribute('poster'));});
  doc.querySelectorAll('a[href]').forEach(function(el){
    var h=el.getAttribute('href');if(!h||/^(#|mailto:|tel:|javascript:|ftp:)/.test(h))return;
    var x=abs(base,h);
    if(x&&same(pageUrl,x)){var c=x.split('#')[0].replace(/\/$/,'');if(!/\.(jpe?g|png|gif|webp|svg|ico|js|css|woff|ttf|pdf|zip|mp4|mp3|docx?|xlsx?|pptx?|rar|gz|doc)(\?|$)/i.test(c)&&!/\/export-events\//i.test(c)&&!/[?&]key=/.test(c))links.add(c);}
  });
  return{imgs:Array.from(imgs),links:Array.from(links)};
}

function updateCrawlStatus(){
  st('Crawled '+pages+'/'+maxPages+' pages, '+Object.keys(images).length+' images. Active: '+activeCount+', Queue: '+queue.length);
  pr((pages/maxPages)*90);
}

function processQueue(){
  while(activeCount<concur&&queue.length>0&&pages+activeCount<maxPages){
    var item=queue.shift();
    if(visited[item.url])continue;
    visited[item.url]=true;
    activeCount++;
    crawlPage(item);
  }
  if(activeCount===0&&queue.length===0){finishCrawl();}
}

async function crawlPage(item){
  L('Crawling: '+item.url);
  updateCrawlStatus();
  try{
    var html=await fetchUrl(item.url);
    pages++;
    var r=extractFromHtml(html,item.url);
    L('  '+r.imgs.length+' images, '+r.links.length+' links on '+item.url,'ok');
    for(var i=0;i<r.imgs.length;i++){addImage(r.imgs[i],item.url,'bok');}
    if(doSub&&item.d<maxD){for(var j=0;j<r.links.length;j++){var lk=r.links[j];if(!visited[lk]&&pages+activeCount+queue.length<maxPages*3)queue.push({url:lk,d:item.d+1});}}
  }catch(e){
    fails++;L('FAILED: '+item.url+' => '+e.message,'err');
    if(fails>0){document.getElementById('sFails').textContent=fails;document.getElementById('sFailChip').style.display='flex';}
  }
  activeCount--;
  updateCrawlStatus();
  processQueue();
}

function finishCrawl(){
  pr(100);updateStats();
  st('Done. '+pages+' pages crawled, '+Object.keys(images).length+' images found'+(fails>0?', '+fails+' failed':'')+'.');
  document.getElementById('goBtn').disabled=false;
  document.getElementById('wpBtn').disabled=false;
  going=false;
}

function runCrawl(){
  if(going)return;
  var raw=document.getElementById('urlInput').value.trim();
  if(!raw){st('Enter a URL first.');return;}
  var start;try{start=new URL(raw).href;}catch(e){st('Invalid URL.');return;}
  doSub=document.getElementById('doSub').checked;
  maxD=parseInt(document.getElementById('maxD').value);
  maxPages=parseInt(document.getElementById('maxP').value);
  concur=parseInt(document.getElementById('concur').value);
  going=true;
  initUI();
  queue.push({url:start,d:0});
  processQueue();
}
</script>
</body>
</html>
