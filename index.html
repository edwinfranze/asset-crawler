<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Image Crawler v2.4</title>
<style>
:root {
  --bg: #0d1117; --sur: #161b22; --bdr: #30363d;
  --acc: #58a6ff; --adim: #1f3556;
  --txt: #e6edf3; --mut: #8b949e;
  --ok: #3fb950; --okbg: #1a3a2a;
  --err: #f85149; --errbg: #3a1a1a;
  --exp: #ff6b35; --expbg: #3a1a00;
  --gone: #d29922; --gonebg: #2a2010;
  --r: 10px;
  --f: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--txt); font-family: var(--f); font-size: 15px; min-height: 100vh; padding: 20px 16px 60px; }
h1 { font-size: 22px; font-weight: 700; letter-spacing: -.4px; margin-bottom: 4px; }
.ver { font-size: 13px; font-weight: 400; color: var(--mut); }
.sub { font-size: 13px; color: var(--mut); line-height: 1.5; margin-bottom: 20px; }
input[type=url] { width: 100%; background: var(--sur); border: 1px solid var(--bdr); border-radius: var(--r); color: var(--txt); font-family: var(--f); font-size: 15px; padding: 12px 14px; outline: none; -webkit-appearance: none; margin-bottom: 10px; }
input:focus { border-color: var(--acc); }
input::placeholder { color: var(--mut); }
.opts { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
.olbl { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--mut); cursor: pointer; }
.olbl input[type=checkbox] { accent-color: var(--acc); width: 16px; height: 16px; }
select { background: var(--sur); border: 1px solid var(--bdr); border-radius: 8px; color: var(--txt); font-family: var(--f); font-size: 13px; padding: 6px 10px; outline: none; -webkit-appearance: none; cursor: pointer; }
.btnrow { display: flex; gap: 10px; margin-bottom: 8px; }
.btn { flex: 1; border: none; border-radius: var(--r); font-family: var(--f); font-size: 15px; font-weight: 700; padding: 14px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary { background: var(--acc); color: #0d1117; }
.btn-secondary { background: var(--sur); border: 1px solid var(--acc); color: var(--acc); }
.note { font-size: 11px; color: var(--mut); line-height: 1.5; margin-bottom: 4px; }
#status { margin-top: 12px; font-size: 13px; color: var(--mut); min-height: 18px; word-break: break-all; }
.pbw { background: var(--sur); border-radius: 4px; height: 4px; margin-top: 8px; overflow: hidden; display: none; }
.pb { background: var(--acc); height: 100%; width: 0%; transition: width .3s; }
.stats { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.chip { background: var(--sur); border: 1px solid var(--bdr); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--mut); display: flex; flex-direction: column; gap: 2px; cursor: pointer; -webkit-tap-highlight-color: transparent; min-width: 60px; transition: outline .15s; }
.chip.active { outline: 2px solid var(--acc); }
.chip b { font-size: 17px; font-weight: 700; color: var(--txt); }
.chip.c-vis b { color: var(--ok); }
.chip.c-exp b { color: var(--exp); }
.chip.c-gone b { color: var(--gone); }
.chip.c-blk b { color: var(--err); }
.logrow { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.logbtn { font-size: 12px; color: var(--mut); background: none; border: none; cursor: pointer; text-decoration: underline; font-family: var(--f); display: none; }
.copybtn { font-size: 11px; color: var(--acc); background: var(--adim); border: 1px solid var(--acc); border-radius: 6px; padding: 3px 10px; cursor: pointer; font-family: var(--f); display: none; }
.logbox { background: var(--sur); border: 1px solid var(--bdr); border-radius: var(--r); font-size: 11px; color: var(--mut); padding: 10px 12px; margin-top: 6px; max-height: 200px; overflow-y: auto; font-family: monospace; line-height: 1.7; display: none; }
.logbox.on { display: block; }
.lerr { color: var(--err); } .lok { color: var(--ok); } .lwarn { color: var(--gone); } .lexp { color: var(--exp); }
#results { margin-top: 16px; }
.sech { font-size: 12px; font-weight: 600; color: var(--mut); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--bdr); }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.card { background: var(--sur); border: 1px solid var(--bdr); border-radius: var(--r); overflow: hidden; position: relative; }
.card.c-exposed { border-color: var(--exp); }
.card.c-gone-card { border-color: var(--gone); }
.thumb { width: 100%; aspect-ratio: 16/10; overflow: hidden; background: #0d1117; display: flex; align-items: center; justify-content: center; }
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb-overlay { display: none; flex-direction: column; align-items: center; justify-content: center; gap: 4px; width: 100%; height: 100%; padding: 8px; text-align: center; }
.thumb-overlay .ico { font-size: 22px; }
.thumb-overlay a { font-size: 10px; color: var(--acc); text-decoration: underline; display: block; margin-top: 2px; line-height: 1.4; }
.ameta { padding: 8px 10px 10px; }
.afn { font-size: 11px; color: var(--txt); word-break: break-all; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.asrc { font-size: 10px; color: var(--mut); margin-top: 3px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.asrc a { color: var(--acc); text-decoration: none; }
.badge { position: absolute; top: 6px; right: 6px; border-radius: 6px; font-size: 10px; font-weight: 700; padding: 2px 6px; text-transform: uppercase; }
.b-vis  { background: var(--okbg);   color: var(--ok); }
.b-exp  { background: var(--expbg);  color: var(--exp); }
.b-gone { background: var(--gonebg); color: var(--gone); }
.b-blk  { background: var(--errbg);  color: var(--err); }
.b-chk  { background: var(--adim);   color: var(--acc); }
.b-wp   { background: #1a2a3a;       color: var(--acc); }
.empty { text-align: center; padding: 40px 20px; color: var(--mut); font-size: 14px; line-height: 1.7; }
</style>
</head>
<body>

<h1>Image Crawler <span class="ver">v2.4</span></h1>
<p class="sub">Security audit tool — finds all images and tests if they are truly inaccessible.</p>

<input type="url" id="urlInput" value="https://paulus.unicoz.nl/" placeholder="https://example.com"
  autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">

<div class="opts">
  <label class="olbl"><input type="checkbox" id="doSub" checked> Subpages</label>
  <label class="olbl">Depth:
    <select id="maxD"><option>1</option><option selected>2</option><option>3</option></select>
  </label>
  <label class="olbl">Max pages:
    <select id="maxP"><option>10</option><option selected>20</option><option>50</option><option>100</option></select>
  </label>
  <label class="olbl">Parallel:
    <select id="concur"><option>3</option><option>5</option><option selected>8</option><option>10</option><option>15</option></select>
  </label>
</div>

<div class="btnrow">
  <button id="btnCrawl" class="btn btn-primary"   onclick="startCrawl()">Crawl pages</button>
  <button id="btnWP"    class="btn btn-secondary" onclick="startWP()">WP Media API</button>
</div>
<p class="note">WP Media API tests original + all resize variants per image.</p>

<div id="status"></div>
<div class="pbw" id="pbw"><div class="pb" id="pb"></div></div>

<div class="logrow">
  <button class="logbtn"  id="logbtn"  onclick="toggleLog()">Show log</button>
  <button class="copybtn" id="copybtn" onclick="copyLog()">Copy log</button>
</div>
<div class="logbox" id="logbox"></div>

<div class="stats" id="statsRow" style="display:none">
  <div class="chip active"  id="chip-all"  onclick="setFilter('all')"><b id="cnt-all">0</b>All</div>
  <div class="chip c-vis"   id="chip-vis"  onclick="setFilter('vis')"><b id="cnt-vis">0</b>Visible</div>
  <div class="chip c-exp"   id="chip-exp"  onclick="setFilter('exp')"  style="display:none"><b id="cnt-exp">0</b>Exposed</div>
  <div class="chip c-gone"  id="chip-gone" onclick="setFilter('gone')" style="display:none"><b id="cnt-gone">0</b>Gone</div>
  <div class="chip c-blk"   id="chip-blk"  onclick="setFilter('blk')"  style="display:none"><b id="cnt-blk">0</b>Blocked</div>
  <div class="chip"         id="chip-pages"><b id="cnt-pages">0</b>Pages</div>
</div>

<div id="results"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
var S = {
  images:  {},   // cleanUrl -> { status, attachPage, sourcePage, allUrls[] }
  logs:    [],
  going:   false,
  filter:  'all',
  counts:  { all:0, vis:0, exp:0, gone:0, blk:0 },
  pending: 0,
  pages:   0,
  fails:   0
};

// ── Proxies ───────────────────────────────────────────────────────────────────
var PROXIES = [
  function(u){ return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
  function(u){ return 'https://api.allorigins.win/get?url='  + encodeURIComponent(u); },
  function(u){ return 'https://corsproxy.io/?url='           + encodeURIComponent(u); }
];

// Fetch HTML/JSON content via proxy with fallback
async function fetchWithProxy(url, timeoutMs) {
  timeoutMs = timeoutMs || 15000;
  var lastErr = '';
  for (var i = 0; i < PROXIES.length; i++) {
    var result = await fetchOnce(PROXIES[i](url), timeoutMs, '*/*');
    if (result.ok) {
      var text = result.text;
      if (text.trim().charAt(0) === '{') {
        try { var j = JSON.parse(text); if (j.contents) text = j.contents; } catch(e) {}
      }
      if (text.length >= 50) return text;
      lastErr = 'Empty response';
    } else {
      lastErr = result.err;
      log('Proxy ' + i + ' failed: ' + result.err, 'lwarn');
    }
  }
  throw new Error(lastErr || 'All proxies failed');
}

// Check HTTP status of an image URL via proxy (HEAD-like, short timeout)
async function checkStatus(url) {
  var result = await fetchOnce(PROXIES[0](url), 5000, 'image/*,*/*');
  if (!result.ok) return { status: 'err', code: result.err };
  // Try to detect 410 vs 200 from content-type
  var ct = result.contentType || '';
  if (ct.indexOf('image') !== -1 || ct.indexOf('octet') !== -1) return { status: 'ok', code: 200 };
  // Proxy returned non-image content - probably an error page
  var snippet = result.text.slice(0, 200).toLowerCase();
  if (snippet.indexOf('410') !== -1 || snippet.indexOf('gone') !== -1) return { status: 'gone', code: 410 };
  if (snippet.indexOf('403') !== -1 || snippet.indexOf('forbidden') !== -1) return { status: 'blocked', code: 403 };
  if (result.text.length > 100) return { status: 'ok', code: 200 }; // has content, assume ok
  return { status: 'blocked', code: 0 };
}

// Single fetch with timeout - returns { ok, text, contentType, err }
async function fetchOnce(proxyUrl, timeoutMs, accept) {
  var ctrl = new AbortController();
  var tid = setTimeout(function(){ ctrl.abort(); }, timeoutMs);
  try {
    var resp = await fetch(proxyUrl, {
      headers: { 'Accept': accept || '*/*' },
      signal: ctrl.signal
    });
    clearTimeout(tid);
    var text = await resp.text();
    var ct = resp.headers.get('content-type') || '';
    if (!resp.ok) return { ok: false, err: 'HTTP ' + resp.status };
    return { ok: true, text: text, contentType: ct };
  } catch(e) {
    clearTimeout(tid);
    return { ok: false, err: e.message };
  }
}

// ── Logging ───────────────────────────────────────────────────────────────────
function log(msg, cls) {
  cls = cls || '';
  var t = new Date().toLocaleTimeString('en', {hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  S.logs.push('[' + t + '] ' + msg);
  var box = document.getElementById('logbox');
  box.innerHTML += '<span class="' + cls + '">[' + t + '] ' + esc(msg) + '</span><br>';
  box.scrollTop = box.scrollHeight;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toggleLog() {
  var b = document.getElementById('logbox');
  b.classList.toggle('on');
  document.getElementById('logbtn').textContent = b.classList.contains('on') ? 'Hide log' : 'Show log';
}
function copyLog() {
  var text = S.logs.join('\n');
  var btn = document.getElementById('copybtn');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function(){
      btn.textContent = 'Copied!';
      setTimeout(function(){ btn.textContent = 'Copy log'; }, 2000);
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    btn.textContent = 'Copied!';
    setTimeout(function(){ btn.textContent = 'Copy log'; }, 2000);
  }
}

// ── UI ────────────────────────────────────────────────────────────────────────
function setStatus(msg) { document.getElementById('status').textContent = msg; }
function setProgress(v) {
  document.getElementById('pbw').style.display = 'block';
  document.getElementById('pb').style.width = Math.min(100, v) + '%';
}
function updateCounts() {
  document.getElementById('cnt-all').textContent   = S.counts.all;
  document.getElementById('cnt-vis').textContent   = S.counts.vis;
  document.getElementById('cnt-exp').textContent   = S.counts.exp;
  document.getElementById('cnt-gone').textContent  = S.counts.gone;
  document.getElementById('cnt-blk').textContent   = S.counts.blk;
  document.getElementById('cnt-pages').textContent = S.pages;
  if (S.counts.exp  > 0) document.getElementById('chip-exp').style.display  = '';
  if (S.counts.gone > 0) document.getElementById('chip-gone').style.display = '';
  if (S.counts.blk  > 0) document.getElementById('chip-blk').style.display  = '';
  document.getElementById('statsRow').style.display = 'flex';
}
function setFilter(f) {
  S.filter = f;
  ['all','vis','exp','gone','blk'].forEach(function(k){
    var el = document.getElementById('chip-' + k);
    if (el) el.classList.toggle('active', k === f);
  });
  document.querySelectorAll('.card').forEach(function(c){
    c.style.display = (f === 'all' || c.dataset.status === f) ? '' : 'none';
  });
}
function setButtons(disabled) {
  document.getElementById('btnCrawl').disabled = disabled;
  document.getElementById('btnWP').disabled    = disabled;
}
function init() {
  S.images = {}; S.logs = []; S.going = true; S.filter = 'all';
  S.counts = { all:0, vis:0, exp:0, gone:0, blk:0 };
  S.pending = 0; S.pages = 0; S.fails = 0;
  setButtons(true);
  ['exp','gone','blk'].forEach(function(k){ document.getElementById('chip-'+k).style.display='none'; });
  ['all','vis','exp','gone','blk'].forEach(function(k){
    var el = document.getElementById('chip-'+k);
    if (el) el.classList.toggle('active', k==='all');
  });
  document.getElementById('statsRow').style.display   = 'none';
  document.getElementById('results').innerHTML         = '<div class="sech">IMAGES</div><div class="grid" id="grid"></div>';
  document.getElementById('pbw').style.display         = 'none';
  document.getElementById('pb').style.width            = '0%';
  document.getElementById('logbox').innerHTML          = '';
  document.getElementById('logbox').classList.remove('on');
  document.getElementById('logbtn').style.display      = 'inline';
  document.getElementById('copybtn').style.display     = 'inline';
  document.getElementById('logbtn').textContent        = 'Show log';
}
function finish() {
  S.going = false;
  setButtons(false);
  setProgress(100);
  setStatus('Done. ' + S.counts.all + ' images — ' +
    S.counts.vis  + ' visible, ' +
    S.counts.exp  + ' exposed, ' +
    S.counts.gone + ' gone (410), ' +
    S.counts.blk  + ' blocked' +
    (S.fails > 0 ? ', ' + S.fails + ' pages failed' : '') + '.');
  log('Complete: vis=' + S.counts.vis + ' exp=' + S.counts.exp + ' gone=' + S.counts.gone + ' blk=' + S.counts.blk, 'lok');
}
function checkDone() {
  if (!S.going && S.pending === 0) finish();
}

// ── URL helpers ───────────────────────────────────────────────────────────────
function cleanUrl(u) {
  return u.split('?')[0].replace(/-\d+x\d+(\.(?:jpe?g|png|gif|webp|svg|avif))$/i, '$1');
}
function fileName(u) {
  try { var p = new URL(u).pathname; return decodeURIComponent(p.split('/').pop() || p || u); }
  catch(e) { return u; }
}
function absUrl(base, href) {
  if (!href || /^(data:|blob:|javascript:)/.test(href)) return null;
  try { return new URL(href, base).href; } catch(e) { return null; }
}
function sameHost(base, u) {
  try { return new URL(u).hostname === new URL(base).hostname; } catch(e) { return false; }
}
function isImageExt(u) {
  return /\.(jpe?g|png|gif|webp|svg|ico|avif|bmp|tiff?)(\?|$)/i.test(u.split('#')[0]);
}

// ── Add image card ─────────────────────────────────────────────────────────────
function addImage(rawUrl, sourcePage, attachPage, extraUrls) {
  var url = cleanUrl(rawUrl);
  if (S.images[url]) return;
  extraUrls = extraUrls || [];
  S.images[url] = { status: 'chk', sourcePage: sourcePage||'', attachPage: attachPage||'', allUrls: [url].concat(extraUrls) };
  S.pending++;
  S.counts.all++;
  updateCounts();

  var fn  = esc(fileName(url));
  var su  = url.replace(/"/g, '%22');
  var src = attachPage
    ? '<a href="'+esc(attachPage)+'" target="_blank" rel="noopener">'+esc(attachPage.replace(/https?:\/\//,'').slice(0,40))+'</a>'
    : esc((sourcePage||'').replace(/https?:\/\//,'').slice(0,40));

  var card = document.createElement('div');
  card.className = 'card';
  card.dataset.url    = url;
  card.dataset.status = 'chk';
  var cardId = 'c' + S.counts.all;
  card.id = cardId;

  card.innerHTML =
    '<a href="'+su+'" target="_blank" rel="noopener" style="display:block;text-decoration:none">'+
      '<div class="thumb">'+
        '<img src="'+su+'" loading="lazy" onload="imgOk(\''+cardId+'\')" onerror="imgErr(\''+cardId+'\')">'+
        '<div class="thumb-overlay" id="ov-'+cardId+'"></div>'+
      '</div>'+
    '</a>'+
    '<div class="ameta"><div class="afn">'+fn+'</div><div class="asrc">'+src+'</div></div>'+
    '<span class="badge b-chk" id="bdg-'+cardId+'">CHECKING</span>';

  document.getElementById('grid').appendChild(card);
  if (S.filter !== 'all') card.style.display = 'none';
}

function getCard(cardId) { return document.getElementById(cardId); }

function imgOk(cardId) {
  var card = getCard(cardId);
  if (!card) return;
  var url = card.dataset.url;
  document.getElementById('bdg-'+cardId).className   = 'badge b-vis';
  document.getElementById('bdg-'+cardId).textContent = 'VISIBLE';
  document.getElementById('ov-'+cardId).style.display = 'none';
  card.dataset.status = 'vis';
  if (S.filter !== 'all' && S.filter !== 'vis') card.style.display = 'none';
  S.images[url].status = 'vis';
  S.counts.vis++;
  S.pending--;
  updateCounts();
  checkDone();
}

async function imgErr(cardId) {
  var card = getCard(cardId);
  if (!card) return;
  var url     = card.dataset.url;
  var imgData = S.images[url];
  var attach  = imgData.attachPage;
  var allUrls = imgData.allUrls || [url];

  // Hide broken img, show overlay
  var imgEl = card.querySelector('img');
  if (imgEl) imgEl.style.display = 'none';
  var ov  = document.getElementById('ov-'+cardId);
  var bdg = document.getElementById('bdg-'+cardId);
  ov.style.display = 'flex';
  ov.innerHTML = '<span class="ico">🔍</span>';
  bdg.className   = 'badge b-chk';
  bdg.textContent = 'CHECKING';

  // Test all URLs (original + resize variants) via proxy
  var bestStatus = 'blk';
  var bestUrl    = url;

  for (var i = 0; i < allUrls.length; i++) {
    var testUrl = allUrls[i];
    var result  = await checkStatus(testUrl);
    log(result.status.toUpperCase() + ' (' + result.code + '): ' + fileName(testUrl),
        result.status === 'ok' ? 'lexp' : result.status === 'gone' ? 'lwarn' : '');

    if (result.status === 'ok') {
      bestStatus = 'exp';
      bestUrl    = testUrl;
      break; // found accessible URL, no need to check more
    }
    if (result.status === 'gone' && bestStatus === 'blk') {
      bestStatus = 'gone';
      bestUrl    = testUrl;
    }
  }

  // Apply final status
  var su = bestUrl.replace(/"/g, '%22');
  var viewLinks =
    '<a href="'+esc(bestUrl)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">Open direct URL</a>' +
    (attach ? '<a href="'+esc(attach)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">View on site</a>' : '');

  if (bestStatus === 'exp') {
    bdg.className = 'badge b-exp'; bdg.textContent = 'EXPOSED';
    card.dataset.status = 'exp'; card.classList.add('c-exposed');
    ov.innerHTML = '<span class="ico">⚠️</span>' + viewLinks;
    S.counts.exp++;
    log('EXPOSED: ' + fileName(bestUrl), 'lexp');
  } else if (bestStatus === 'gone') {
    bdg.className = 'badge b-gone'; bdg.textContent = 'GONE';
    card.dataset.status = 'gone'; card.classList.add('c-gone-card');
    ov.innerHTML = '<span class="ico">🗑️</span>' + viewLinks;
    S.counts.gone++;
  } else {
    bdg.className = 'badge b-blk'; bdg.textContent = 'BLOCKED';
    card.dataset.status = 'blk';
    ov.innerHTML = '<span class="ico">🔒</span>' + viewLinks;
    S.counts.blk++;
  }

  if (S.filter !== 'all' && S.filter !== card.dataset.status) card.style.display = 'none';
  S.images[url].status = card.dataset.status;
  S.pending--;
  updateCounts();
  checkDone();
}

// ── HTML extraction ───────────────────────────────────────────────────────────
function extractFromHtml(html, pageUrl) {
  var imgs = {}, links = {};
  var doc;
  try { doc = new DOMParser().parseFromString(html, 'text/html'); } catch(e) { return { imgs:[], links:[] }; }
  var baseEl = doc.querySelector('base[href]');
  var base   = baseEl ? (absUrl(pageUrl, baseEl.getAttribute('href')) || pageUrl) : pageUrl;

  function addImg(h) {
    if (!h || h.indexOf('data:') === 0) return;
    var x = absUrl(base, h);
    if (!x || x.indexOf('data:') === 0 || x.indexOf('base64') !== -1) return;
    if (x.split('/').pop().length < 3) return;
    imgs[x] = true;
  }
  function addSrcset(v) {
    if (!v) return;
    v.split(',').forEach(function(s){ var p = s.trim().split(/\s+/)[0]; if (p) addImg(p); });
  }

  doc.querySelectorAll('img').forEach(function(el){
    ['src','data-src','data-lazy-src','data-original','data-img','data-image','data-bg','data-lazy'].forEach(function(a){ addImg(el.getAttribute(a)); });
    ['srcset','data-srcset','data-lazy-srcset'].forEach(function(a){ addSrcset(el.getAttribute(a)); });
  });
  doc.querySelectorAll('picture source').forEach(function(el){
    addSrcset(el.getAttribute('srcset')); addImg(el.getAttribute('src'));
  });
  doc.querySelectorAll('[style]').forEach(function(el){
    var m, re = /url\(\s*['"]?([^'")\s]+)['"]?\s*\)/gi, s = el.getAttribute('style') || '';
    while ((m = re.exec(s)) !== null) { if (isImageExt(m[1])) addImg(m[1]); }
  });
  doc.querySelectorAll('style').forEach(function(el){
    var m, re = /url\(\s*['"]?([^'")\s]+)['"]?\s*\)/gi, css = el.textContent || '';
    while ((m = re.exec(css)) !== null) { if (!m[1].startsWith('data:') && isImageExt(m[1])) addImg(m[1]); }
  });
  doc.querySelectorAll('meta[property="og:image"],meta[name="twitter:image"],meta[property="og:image:url"]').forEach(function(el){ addImg(el.getAttribute('content')); });
  doc.querySelectorAll('link[rel~="icon"][href],link[rel~="apple-touch-icon"][href]').forEach(function(el){ addImg(el.getAttribute('href')); });
  doc.querySelectorAll('video[poster]').forEach(function(el){ addImg(el.getAttribute('poster')); });
  doc.querySelectorAll('[data-background],[data-bg-src],[data-background-image]').forEach(function(el){
    ['data-background','data-bg-src','data-background-image'].forEach(function(a){ var v = el.getAttribute(a); if (v && v.charAt(0) !== '{') addImg(v); });
  });
  doc.querySelectorAll('a[href]').forEach(function(el){
    var h = el.getAttribute('href');
    if (!h || /^(#|mailto:|tel:|javascript:|ftp:)/.test(h)) return;
    var x = absUrl(base, h);
    if (x && sameHost(pageUrl, x)) {
      var c = x.split('#')[0].replace(/\/$/, '');
      if (!/\.(jpe?g|png|gif|webp|svg|ico|js|css|woff|ttf|pdf|zip|mp4|mp3|docx?|xlsx?|pptx?|rar|gz)(\?|$)/i.test(c) &&
          !/\/export-events\//i.test(c) && !/[?&]key=/i.test(c)) {
        links[c] = true;
      }
    }
  });
  return { imgs: Object.keys(imgs), links: Object.keys(links) };
}

// ── Page crawler ───────────────────────────────────────────────────────────────
function startCrawl() {
  if (S.going) return;
  var raw = document.getElementById('urlInput').value.trim();
  if (!raw) { setStatus('Enter a URL first.'); return; }
  var startUrl;
  try { startUrl = new URL(raw).href; } catch(e) { setStatus('Invalid URL.'); return; }
  var doSub  = document.getElementById('doSub').checked;
  var maxD   = parseInt(document.getElementById('maxD').value);
  var maxP   = parseInt(document.getElementById('maxP').value);
  var concur = parseInt(document.getElementById('concur').value);
  init();
  setStatus('Starting crawl...');
  var visited = {}, queue = [{ url: startUrl, depth: 0 }], active = 0;

  function next() {
    while (active < concur && queue.length > 0 && S.pages + active < maxP) {
      var item = queue.shift();
      if (visited[item.url]) continue;
      visited[item.url] = true;
      active++;
      crawlOne(item);
    }
    if (active === 0) {
      S.going = false;
      setProgress(90);
      setStatus('Crawl done. ' + S.pages + ' pages, ' + S.counts.all + ' images. Checking access...');
      checkDone();
    }
  }

  async function crawlOne(item) {
    setStatus('Crawling ' + (S.pages + active) + '/' + maxP + ': ' + item.url);
    setProgress(((S.pages + active) / maxP) * 80);
    log('Crawling: ' + item.url);
    try {
      var html = await fetchWithProxy(item.url);
      S.pages++;
      var r = extractFromHtml(html, item.url);
      log('  ' + r.imgs.length + ' images, ' + r.links.length + ' links', 'lok');
      r.imgs.forEach(function(u){ addImage(u, item.url, null, []); });
      if (doSub && item.depth < maxD) {
        r.links.forEach(function(lk){ if (!visited[lk]) queue.push({ url: lk, depth: item.depth + 1 }); });
      }
    } catch(e) {
      S.fails++;
      log('FAILED: ' + item.url + ' — ' + e.message, 'lerr');
    }
    active--;
    next();
  }
  next();
}

// ── WP Media API ──────────────────────────────────────────────────────────────
async function startWP() {
  if (S.going) return;
  var raw = document.getElementById('urlInput').value.trim();
  if (!raw) { setStatus('Enter a URL first.'); return; }
  var origin;
  try { origin = new URL(raw).origin; } catch(e) { setStatus('Invalid URL.'); return; }
  init();
  setStatus('Fetching WordPress media library...');
  setProgress(5);

  var page = 1, total = 0;
  try {
    while (true) {
      var apiUrl = origin + '/wp-json/wp/v2/media?per_page=100&page=' + page + '&media_type=image&_fields=id,source_url,link,media_details';
      log('WP API page ' + page);
      var text = await fetchWithProxy(apiUrl, 20000);
      var items;
      try { items = JSON.parse(text); } catch(e) { throw new Error('JSON parse failed'); }
      if (!Array.isArray(items) || items.length === 0) { log('No more items'); break; }
      log('Got ' + items.length + ' items', 'lok');

      items.forEach(function(item) {
        var src    = item.source_url || '';
        var attach = item.link       || '';
        if (!src) return;

        // Collect all size variants for this image
        var extraUrls = [];
        var sizes = item.media_details && item.media_details.sizes ? item.media_details.sizes : {};
        Object.keys(sizes).forEach(function(sz) {
          var sizeUrl = sizes[sz] && sizes[sz].source_url;
          if (sizeUrl && sizeUrl !== src) extraUrls.push(sizeUrl);
        });

        addImage(src, 'WP Media Library', attach, extraUrls);
      });

      total += items.length;
      setProgress(Math.min(60, 5 + page * 10));
      page++;
      if (items.length < 100) break;
      await new Promise(function(r){ setTimeout(r, 300); });
    }
    log('All ' + total + ' items fetched. Checking access for ' + S.counts.all + ' images...', 'lok');
    setStatus('Checking access for ' + S.counts.all + ' images...');
    setProgress(70);
  } catch(e) {
    log('WP API error: ' + e.message, 'lerr');
    setStatus('Error: ' + e.message);
  }
  S.going = false;
  checkDone();
}
